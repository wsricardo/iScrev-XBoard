<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>iScrev XBoard</title>

  <script>
    // Força a barra no final da URL para evitar que caminhos relativos quebrem
    if (!window.location.pathname.endsWith('/') && !window.location.pathname.endsWith('.html')) {
      window.location.replace(window.location.pathname + '/' + window.location.search + window.location.hash);
    }
  </script>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/modals.css">
</head>

<body>
  <!-- Área de Desenho -->
  <canvas id="main-canvas"></canvas>

  <!-- Botão Discreto para restaurar menu -->
  <button id="btn-restore-toolbar" class="restore-toolbar-btn hidden" data-i18n-title="tool_restore">🔼</button>

  <!-- Barra de Ferramentas UI -->
  <nav id="toolbar">
    <div class="tool-group">
      <button class="tool-btn active" id="btn-pen" data-i18n-title="tool_pen">✏️</button>
      <button class="tool-btn" id="btn-eraser" data-i18n-title="tool_eraser">🧼</button>
    </div>

    <div class="tool-group">
      <input type="color" id="color-picker" value="#ffffff" title="Cor">
      <input type="range" id="size-picker" min="1" max="50" value="4" title="Espessura">
    </div>

    <div class="tool-group mobile-hide">
      <button class="tool-btn" id="btn-bg" data-i18n-title="tool_bg">🎨</button>
    </div>

    <div class="tool-group board-controls mobile-hide">
      <button class="tool-btn" id="btn-prev-board" data-i18n-title="tool_prev">⬅️</button>
      <span id="board-counter" style="min-width: 40px; text-align: center; font-weight: bold;">1/1</span>
      <button class="tool-btn" id="btn-next-board" data-i18n-title="tool_next">➡️</button>
    </div>

    <div class="tool-group">
      <button class="tool-btn" id="btn-undo" data-i18n-title="tool_undo">↩️</button>
      <button class="tool-btn" id="btn-redo" data-i18n-title="tool_redo">↪️</button>
      <button class="tool-btn" id="btn-clear" data-i18n-title="tool_clear">🗑️</button>
      <button class="tool-btn" id="btn-remove-board" data-i18n-title="tool_remove">❌</button>
    </div>

    <div class="tool-group mobile-hide">
      <button class="tool-btn" id="btn-admin" data-i18n-title="tool_library">📚</button>
      <button class="tool-btn" id="btn-pdf" data-i18n-title="tool_pdf">📄</button>
      <button class="tool-btn" id="btn-video" data-i18n-title="tool_video">🎥</button>
      <button class="tool-btn" id="btn-record" data-i18n-title="tool_record">⏺️</button>
    </div>

    <div class="tool-group mobile-hide">
      <button class="tool-btn" id="btn-lang" title="Idiomas / Languages">🌐</button>
      <button class="tool-btn" id="btn-fullscreen" data-i18n-title="tool_fullscreen">🔲</button>
      <button class="tool-btn" id="btn-hide-toolbar" data-i18n-title="tool_minimize">🔽</button>
    </div>

    <!-- Menu Sanduíche (Mobile) -->
    <div class="tool-group mobile-only" style="border-right: none; padding-right: 0;">
      <button class="tool-btn" id="btn-hamburger" data-i18n-title="tool_menu">☰</button>
    </div>

    <!-- Botão Dinâmico PWA -->
    <div class="tool-group" style="border-right: none;">
      <button class="tool-btn hidden" id="btn-install" data-i18n-title="tool_install"
        style="display: none; background: #28a745; box-shadow: 0 0 10px rgba(40,167,69,0.6);"
        title="Instalar App">📲</button>
    </div>
  </nav>

  <!-- Modal de Idiomas -->
  <dialog id="lang-dialog" class="glass-dialog" style="width: 500px; height: 300px;">
    <header class="dialog-header">
      <h3 data-i18n="lang_title">🌐 Selecione o Idioma / Select Language</h3>
      <button id="btn-close-lang" class="close-btn">✖</button>
    </header>
    <div id="lang-content" style="padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
      <div class="bg-card lang-card" data-lang="pt-BR"
        style="background: #1e1e1e; border: 2px solid #555; border-radius: 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 120px;">
        <span style="font-size: 3rem;">🇧🇷</span>
        <span style="font-weight: bold; font-size: 1.1rem; color: #fff; margin-top: 10px;">Português</span>
      </div>
      <div class="bg-card lang-card" data-lang="en"
        style="background: #1e1e1e; border: 2px solid #555; border-radius: 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 120px;">
        <span style="font-size: 3rem;">🇺🇸</span>
        <span style="font-weight: bold; font-size: 1.1rem; color: #fff; margin-top: 10px;">English</span>
      </div>
    </div>
  </dialog>

  <!-- Modais de Mídia -->
  <dialog id="media-dialog" class="glass-dialog">
    <header class="dialog-header">
      <h3 id="dialog-title" data-i18n="media_title">Visualizador</h3>
      <div style="display: flex; gap: 10px;">
        <button id="btn-minimize-dialog" class="close-btn" style="color: #ffc107;"
          data-i18n-title="media_minimize">➖</button>
        <button id="btn-close-dialog" class="close-btn" data-i18n-title="media_close">✖</button>
      </div>
    </header>
    <div id="dialog-content">
    </div>
  </dialog>

  <!-- Painel Administrativo / Biblioteca -->
  <dialog id="admin-dialog" class="glass-dialog">
    <header class="dialog-header">
      <h3 data-i18n="lib_title">📚 Biblioteca de Aulas</h3>
      <button id="btn-close-admin" class="close-btn">✖</button>
    </header>
    <div id="admin-content" style="padding: 20px;">

      <div class="save-section">
        <button id="btn-new-lesson" class="admin-btn admin-btn-secondary" data-i18n="lib_btn_new">📄 Nova Aula</button>
        <input type="text" id="lesson-title-input" class="admin-input" placeholder="Nome da aula atual..."
          data-i18n-title="lib_save_prompt">
        <button id="btn-save-lesson" class="admin-btn admin-btn-primary" data-i18n="lib_btn_save">💾 Salvar Lousa
          Atual</button>
      </div>

      <h4>Aulas Salvas</h4>
      <div id="lessons-list"
        style="margin-top: 15px; display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; padding-right: 10px;">
      </div>

    </div>
  </dialog>

  <!-- Modal de Fundo -->
  <dialog id="bg-dialog" class="glass-dialog" style="width: 600px; height: 400px;">
    <header class="dialog-header">
      <h3 data-i18n="bg_title">🎨 Configurar Fundo</h3>
      <button id="btn-close-bg" class="close-btn">✖</button>
    </header>
    <div id="bg-content" style="padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">

      <div class="bg-card" data-type="solid" data-color="#1e1e1e"
        style="background: #1e1e1e; border: 2px solid #555; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; height: 120px;">
        <span style="font-weight: bold; font-size: 1.1rem; color: #fff;" data-i18n="bg_solid">Lousa Preta</span>
      </div>

      <div class="bg-card" data-type="lines" data-color="#1e1e1e"
        style="background: repeating-linear-gradient(#1e1e1e, #1e1e1e 39px, rgba(255,255,255,0.15) 39px, rgba(255,255,255,0.15) 40px); border: 2px solid #555; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; height: 120px;">
        <span
          style="font-weight: bold; font-size: 1.1rem; color: #fff; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 4px;"
          data-i18n="bg_lines">Caderno</span>
      </div>

      <div class="bg-card" data-type="grid" data-color="#1e1e1e"
        style="background: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 40px 40px; background-color: #1e1e1e; border: 2px solid #555; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; height: 120px;">
        <span
          style="font-weight: bold; font-size: 1.1rem; color: #fff; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 4px;"
          data-i18n="bg_grid">Quadriculado</span>
      </div>

      <div class="bg-card" data-type="custom"
        style="background: #333; border: 2px solid #555; border-radius: 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 120px;">
        <span style="font-weight: bold; font-size: 1.1rem; color: #fff; margin-bottom: 10px;" data-i18n="bg_custom">Cor
          Sólida (Livre)</span>
        <input type="color" id="custom-bg-color" value="#ffffff" style="width: 50px; height: 30px;">
      </div>

    </div>
  </dialog>

  <!-- Bibliotecas -->
  <script src="js/libs/jspdf.umd.min.js"></script>

  <!-- Scripts -->
  <script src="js/modules/i18n.js"></script>
  <script src="js/services/storage.js"></script>
  <script src="js/modules/background-manager.js"></script>
  <script src="js/core/history.js"></script>
  <script src="js/core/canvas-engine.js"></script>
  <script src="js/modules/media-viewer.js"></script>
  <script src="js/modules/recorder.js"></script>
  <script src="js/modules/ui-manager.js"></script>
  <script src="js/modules/pdf-exporter.js"></script>
  <script src="js/modules/admin-panel.js"></script>
  <script src="js/modules/pwa-manager.js"></script>
</body>

</html>
